name: Release

# Build cross-platform bundles, then publish them to this repository's
# Releases.
#
#   - Push a version tag (e.g. v0.1.0)  -> build + publish a draft Release
#                                          in this repo.
#   - Manual run (workflow_dispatch)    -> build only; bundles are left as
#                                          downloadable workflow artifacts.
#
# No extra setup needed: the publish step uses the built-in GITHUB_TOKEN,
# which already has write access to this repo's Releases (granted via the
# publish job's `permissions: contents: write`).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          # Intel macOS
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            # Explicitly emit all three Linux bundle formats (incl. rpm).
            args: "--bundles deb,rpm,appimage"
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri v2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: npm ci

      # Build only — no Release is created here (tagName left empty). The
      # cross-repo publish happens in the separate `publish` job below.
      - name: Build the app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      # Hand each leg's bundles to the publish job (and make them downloadable
      # for manual runs). One artifact per matrix leg.
      - name: Upload bundles as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}${{ matrix.rust-target && format('-{0}', matrix.rust-target) || '' }}
          path: "${{ join(fromJSON(steps.tauri.outputs.artifactPaths), '\n') }}"
          if-no-files-found: warn

  # Collect every leg's bundles and publish them to this repo's Releases.
  # Only runs for version tags; manual runs stop after `build` (artifacts only).
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Release in this repo
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: dist-bundles
          merge-multiple: true

      - name: List downloaded files
        run: find dist-bundles -type f | sort

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DeltaScope ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: dist-bundles/**/*
          fail_on_unmatched_files: true
